name: Export NUT UPS Image AMD64
on: [workflow_dispatch] # 允许手动点击按钮开始

jobs:
  export_image:
    runs-on: ubuntu-latest
    steps:
      - name: Pull AMD64 Image
        run: |
          # 拉取 NUT 镜像，明确指定 amd64 架构
          docker pull --platform linux/amd64 ghcr.io/jr0wdog/nut-upsd:latest
          
      - name: Save to TAR
        run: |
          # 将镜像导出为 tar 文件
          docker save ghcr.io/jr0wdog/nut-upsd:latest > nut_upsd_amd64.tar
          
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: nut-upsd-bundle # GitHub 下载页显示的名称
          path: nut_upsd_amd64.tar
          retention-days: 1 # 下载完就失效，节省空间
