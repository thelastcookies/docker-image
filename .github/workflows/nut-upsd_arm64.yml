name: Export NUT-UPSD ARM64
on: [workflow_dispatch]

jobs:
  export_image:
    runs-on: ubuntu-latest
    steps:
      - name: Pull ARM64 Image
        run: |
          # 换用 Docker Hub 的常用镜像，通常不需要登录且支持多架构
          docker pull --platform linux/arm64 instantlinux/nut-upsd:latest
          
      - name: Save to TAR
        run: |
          # 导出镜像
          docker save instantlinux/nut-upsd:latest > nut_upsd_arm64.tar
          
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: nut-upsd-arm64-bundle
          path: nut_upsd_arm64.tar
          retention-days: 1
